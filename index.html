<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yandex WebDAV PUT Test</title>

<link rel="manifest" href="manifest.json">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>Yandex WebDAV PUT Test</h3>

    <div class="mb-3">
        <label class="form-label">Логин Яндекс</label>
        <input type="text" class="form-control" id="login" autocomplete="username">
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль приложения</label>
        <input type="password" class="form-control" id="password" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="saveBtn">Сохранить</button>
    <button class="btn btn-success" id="putBtn">PUT test.txt</button>
    <button class="btn btn-secondary" id="getBtn">GET test.txt</button>

    <hr>

    <pre id="result" style="white-space: pre-wrap;"></pre>

</div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}

const loginInput = document.getElementById('login');
const passwordInput = document.getElementById('password');
const result = document.getElementById('result');

const FILE_URL = 'https://webdav.yandex.ru/spaupdates/test.txt';

loginInput.value = localStorage.getItem('yandex_login') || '';
passwordInput.value = localStorage.getItem('yandex_password') || '';

function log(text) {
    result.textContent = text;
}

function headersToText(headers) {
    const items = [];

    for (const [key, value] of headers.entries()) {
        items.push(`${key}: ${value}`);
    }

    return items.length ? items.join('\n') : '(нет доступных заголовков)';
}

function getAuthHeader() {
    const login = loginInput.value.trim();
    const password = passwordInput.value;

    if (!login || !password) {
        throw new Error('Введите логин и пароль приложения');
    }

    return 'Basic ' + btoa(`${login}:${password}`);
}

function formatError(error, stage) {
    return [
        'Ошибка запроса',
        '',
        `Шаг: ${stage}`,
        `URL: ${FILE_URL}`,
        `Online: ${navigator.onLine ? 'yes' : 'no'}`,
        '',
        `name: ${error?.name || 'UnknownError'}`,
        `message: ${error?.message || String(error)}`,
        '',
        'Вероятно, это CORS/preflight, если ошибка: TypeError: Load failed / Failed to fetch.'
    ].join('\n');
}

async function readResponse(response) {
    let body = '';

    try {
        body = await response.text();
    } catch (e) {
        body = '(не удалось прочитать body)';
    }

    return [
        `HTTP STATUS: ${response.status} ${response.statusText}`,
        `OK: ${response.ok}`,
        '',
        'Headers:',
        headersToText(response.headers),
        '',
        'Body:',
        body || '(пустой ответ)'
    ].join('\n');
}

document.getElementById('saveBtn').addEventListener('click', () => {
    localStorage.setItem('yandex_login', loginInput.value.trim());
    localStorage.setItem('yandex_password', passwordInput.value);

    log('Сохранено');
});

document.getElementById('putBtn').addEventListener('click', async () => {
    log('PUT: загружаем файл...');

    try {
        const response = await fetch(FILE_URL, {
            method: 'PUT',
            mode: 'cors',
            cache: 'no-store',
            headers: {
                'Authorization': getAuthHeader(),
                'Content-Type': 'text/plain;charset=utf-8'
            },
            body:
                'Hello from iPhone PWA\n' +
                'Time: ' + new Date().toISOString() + '\n'
        });

        log(
            'PUT завершен\n\n' +
            await readResponse(response)
        );

    } catch (e) {
        log(formatError(e, 'PUT test.txt'));
    }
});

document.getElementById('getBtn').addEventListener('click', async () => {
    log('GET: читаем файл...');

    try {
        const response = await fetch(FILE_URL + '?_=' + Date.now(), {
            method: 'GET',
            mode: 'cors',
            cache: 'no-store',
            headers: {
                'Authorization': getAuthHeader()
            }
        });

        log(
            'GET завершен\n\n' +
            await readResponse(response)
        );

    } catch (e) {
        log(formatError(e, 'GET test.txt'));
    }
});
</script>

</body>
</html>
