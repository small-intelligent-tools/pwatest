<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yandex WebDAV Test</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>Yandex WebDAV Test</h3>

    <div class="mb-3">
        <label class="form-label">Логин Яндекс</label>
        <input type="text" class="form-control" id="login">
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль приложения</label>
        <input type="password" class="form-control" id="password">
    </div>

    <button class="btn btn-primary" id="saveBtn">
        Сохранить
    </button>

    <button class="btn btn-success" id="testBtn">
        Тест загрузки
    </button>

    <hr>

    <pre id="result"></pre>

</div>

<script>

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}

const loginInput = document.getElementById('login');
const passwordInput = document.getElementById('password');
const result = document.getElementById('result');
let lastRequestMeta = {
    stage: 'n/a',
    method: 'n/a',
    url: 'n/a'
};

function headersToText(headers) {
    const items = [];

    for (const [key, value] of headers.entries()) {
        items.push(`${key}: ${value}`);
    }

    return items.length
        ? items.join('\n')
        : '(нет заголовков)';
}

function formatFetchError(error, meta) {
    const lines = [
        'Ошибка запроса',
        '',
        `Шаг: ${meta.stage}`,
        `Метод: ${meta.method}`,
        `URL: ${meta.url}`,
        `Online: ${navigator.onLine ? 'yes' : 'no'}`,
        '',
        `name: ${error?.name || 'UnknownError'}`,
        `message: ${error?.message || String(error)}`
    ];

    if (error?.cause) {
        lines.push(`cause: ${String(error.cause)}`);
    }

    if (error?.stack) {
        lines.push('', 'stack:', error.stack);
    }

    return lines.join('\n');
}

async function fetchWithMeta(stage, url, options) {
    lastRequestMeta = {
        stage,
        method: options?.method || 'GET',
        url
    };

    return fetch(url, options);
}

loginInput.value = localStorage.getItem('yandex_login') || '';
passwordInput.value = localStorage.getItem('yandex_password') || '';

document.getElementById('saveBtn').addEventListener('click', () => {

    localStorage.setItem(
        'yandex_login',
        loginInput.value.trim()
    );

    localStorage.setItem(
        'yandex_password',
        passwordInput.value
    );

    result.textContent = 'Сохранено';
});

document.getElementById('testBtn').addEventListener('click', async () => {

    const login = loginInput.value.trim();
    const password = passwordInput.value;

    if (!login || !password) {
        result.textContent = 'Введите логин и пароль';
        return;
    }

    result.textContent = 'Создаем папку...';

    const auth = btoa(`${login}:${password}`);

    try {

        const folderUrl =
            'https://webdav.yandex.ru/spaupdates';

        const mkcolResponse = await fetchWithMeta(
            'Создание папки',
            folderUrl,
            {
                method: 'MKCOL',
                headers: {
                    'Authorization': `Basic ${auth}`
                }
            }
        );

        const mkcolBody = await mkcolResponse.text();

        if (![200, 201, 204, 405].includes(mkcolResponse.status)) {
            result.textContent = [
                'Ошибка создания папки',
                `HTTP STATUS: ${mkcolResponse.status} ${mkcolResponse.statusText}`,
                '',
                'Headers:',
                headersToText(mkcolResponse.headers),
                '',
                'Body:',
                mkcolBody || '(пустой ответ)'
            ].join('\n');
            return;
        }

        result.textContent = 'Загружаем файл...';

        const uploadUrl =
            'https://webdav.yandex.ru/spaupdates/test.txt';

        const response = await fetchWithMeta(
            'Загрузка файла',
            uploadUrl,
            {
                method: 'PUT',
                headers: {
                    'Authorization': `Basic ${auth}`,
                    'Content-Type': 'text/plain'
                },
                body:
                    'Hello from PWA\n' +
                    new Date().toISOString()
            }
        );

        const responseBody = await response.text();

        result.textContent =
            (response.ok
                ? 'Загрузка завершена'
                : 'Ошибка загрузки файла') +
            '\n\n' +
            'HTTP STATUS: ' + response.status + ' ' + response.statusText +
            '\n' +
            'OK: ' + response.ok +
            '\n\n' +
            'Headers:\n' +
            headersToText(response.headers) +
            '\n\n' +
            'Body:\n' +
            (responseBody || '(пустой ответ)');

    } catch (e) {

        result.textContent = formatFetchError(e, lastRequestMeta);
    }
});

</script>

</body>
</html>
