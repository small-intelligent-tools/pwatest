<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yandex WebDAV Test</title>

<link rel="manifest" href="manifest.json">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3>Yandex WebDAV Test</h3>

    <div class="mb-3">
        <label class="form-label">Логин Яндекс</label>
        <input type="text" class="form-control" id="login">
    </div>

    <div class="mb-3">
        <label class="form-label">Пароль приложения</label>
        <input type="password" class="form-control" id="password">
    </div>

    <button class="btn btn-primary" id="saveBtn">
        Сохранить
    </button>

    <button class="btn btn-success" id="testBtn">
        Тест загрузки
    </button>

    <hr>

    <pre id="result"></pre>

</div>

<script>

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}

const loginInput = document.getElementById('login');
const passwordInput = document.getElementById('password');
const result = document.getElementById('result');

loginInput.value = localStorage.getItem('yandex_login') || '';
passwordInput.value = localStorage.getItem('yandex_password') || '';

document.getElementById('saveBtn').addEventListener('click', () => {

    localStorage.setItem(
        'yandex_login',
        loginInput.value.trim()
    );

    localStorage.setItem(
        'yandex_password',
        passwordInput.value
    );

    result.textContent = 'Сохранено';
});

document.getElementById('testBtn').addEventListener('click', async () => {

    const login = loginInput.value.trim();
    const password = passwordInput.value;

    if (!login || !password) {
        result.textContent = 'Введите логин и пароль';
        return;
    }

    result.textContent = 'Создаем папку...';

    const auth = btoa(`${login}:${password}`);

    try {

        const folderUrl =
            'https://webdav.yandex.ru/spaupdates';

        await fetch(folderUrl, {
            method: 'MKCOL',
            headers: {
                'Authorization': `Basic ${auth}`
            }
        });

        result.textContent = 'Загружаем файл...';

        const uploadUrl =
            'https://webdav.yandex.ru/spaupdates/test.txt';

        const response = await fetch(uploadUrl, {
            method: 'PUT',
            headers: {
                'Authorization': `Basic ${auth}`,
                'Content-Type': 'text/plain'
            },
            body:
                'Hello from PWA\n' +
                new Date().toISOString()
        });

        result.textContent =
            'HTTP STATUS: ' + response.status +
            '\n\n' +
            await response.text();

    } catch (e) {

        result.textContent =
            'Ошибка:\n\n' +
            e.toString();
    }
});

</script>

</body>
</html>
